<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Steph F Edit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
/* ================================================
   THE STEPH F EDIT — Shared Styles
   Edit colors, fonts, and layout here.
   ================================================ */

:root {
  --terracotta: #e8a98a;
  --terracotta-light: #f2d4c4;
  --terracotta-dark: #c4755a;
  --teal: #7bbfba;
  --teal-light: #c2e0dc;
  --teal-dark: #4e9c96;
  --cream: #faf6f2;
  --warm-white: #fffdf9;
  --warm-dark: #3a2419;
  --warm-mid: #8c6654;
  --muted: #b89b8e;
}

* { box-sizing: border-box; }

body {
  background-color: var(--cream);
  color: var(--warm-dark);
  -webkit-font-smoothing: antialiased;
  margin: 0;
  font-family: 'Nunito', sans-serif;
}

h1, h2, h3, h4 {
  letter-spacing: .01em;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
}

a { color: inherit; text-decoration: none; }

/* NAV */
.site-nav {
  background: var(--warm-white);
  border-bottom: 1px solid var(--terracotta-light);
  z-index: 100;
  justify-content: space-between;
  align-items: center;
  height: 72px;
  padding: 0 2rem;
  display: flex;
  position: sticky;
  top: 0;
  box-shadow: 0 1px 8px #c4755a0f;
}
.site-nav .brand {
  color: var(--terracotta-dark);
  letter-spacing: .04em;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem;
  font-style: italic;
  font-weight: 500;
  text-decoration: none;
}
.site-nav .brand span { color: var(--teal-dark); font-style: normal; }
.nav-links { gap: 2.2rem; margin: 0; padding: 0; list-style: none; display: flex; }
.nav-links a {
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--warm-mid);
  font-family: 'Nunito', sans-serif;
  font-size: .85rem;
  font-weight: 600;
  text-decoration: none;
  transition: color .2s;
}
.nav-links a:hover { color: var(--terracotta-dark); }

/* FOOTER */
.site-footer {
  background: var(--warm-dark);
  color: #ffffff8c;
  text-align: center;
  letter-spacing: .08em;
  margin-top: 6rem;
  padding: 2.5rem 2rem;
  font-size: .82rem;
}
.site-footer a { color: var(--terracotta-light); text-decoration: none; }

/* HOME HERO */
.home-hero {
  background: linear-gradient(135deg, var(--terracotta-light) 0%, var(--teal-light) 100%);
  text-align: center;
  padding: 5rem 2rem 4rem;
  position: relative;
  overflow: hidden;
}
.home-hero::before {
  content: "";
  pointer-events: none;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.15'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  position: absolute;
  inset: 0;
}
.home-hero h1 { 
  color: var(--warm-dark); 
  margin: 0 0 .5rem; 
  font-size: clamp(2rem, 4vw, 3.5rem); 
}
</style>
</head>
